services:
  - type: web
    name: college-management-system
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 30d
      - key: COLLEGE_NAME
        value: EduManager College
      - key: LIBRARY_FINE_PER_DAY
        value: 2
